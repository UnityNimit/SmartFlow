<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Analytics - Smart Traffic Lights Controller</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="dark-mode.css"> <!-- Link to dark mode styles -->
</head>
<body>
    <header>
        <h1>Data Analytics</h1>
        <button id="darkModeToggle">Toggle Dark Mode</button> <!-- Dark mode toggle button -->
    </header>

    <nav>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="control-panel.html">Control Panel</a></li>
            <li><a href="data-analytics.html">Data Analytics</a></li>
            <li><a href="live-feed.html">Live Video Feed</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <div class="analytics-container">
                <div class="analytics-card">
                    <h3>Daily Traffic Volume</h3>
                    <canvas id="dailyTrafficVolumeChart"></canvas>
                </div>
                <div class="analytics-card">
                    <h3>Average Speed</h3>
                    <canvas id="averageSpeedChart"></canvas>
                </div>
                <div class="analytics-card">
                    <h3>Incident Reports</h3>
                    <canvas id="incidentReportsChart"></canvas>
                </div>
                <div class="analytics-card">
                    <h3>Traffic Density Heatmap</h3>
                    <canvas id="trafficDensityHeatmap"></canvas>
                </div>
                <div class="analytics-card">
                    <h3>Historical Data Analysis</h3>
                    <input type="date" id="startDate">
                    <input type="date" id="endDate">
                    <button id="fetchHistoricalData">Fetch Data</button>
                    <canvas id="historicalDataChart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Smart Traffic Lights</p>
    </footer>

    <script src="scripts.js"></script>
    <script>
        // Dark mode toggle functionality
        document.getElementById('darkModeToggle').addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
        });

        // Fetch historical data on button click
        document.getElementById('fetchHistoricalData').addEventListener('click', function() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            // Fetch and display historical data logic here
        });

        // Initialize charts (example)
        const ctx1 = document.getElementById('dailyTrafficVolumeChart').getContext('2d');
        const dailyTrafficVolumeChart = new Chart(ctx1, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Traffic Volume',
                    data: [120, 150, 180, 200, 170, 130, 90],
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        // Additional chart initialization for average speed, incident reports, etc.
    </script>
</body>
</html>
